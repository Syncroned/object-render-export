name: Build Mod

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Geode CLI
        run: |
          curl -L https://github.com/geode-sdk/cli/releases/latest/download/geode-linux -o geode
          sudo chmod +x geode
          sudo mv geode /usr/local/bin/

      - name: Setup Android NDK
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          unzip -q android-ndk-r29-linux.zip
          echo "ANDROID_NDK_ROOT=$GITHUB_WORKSPACE/android-ndk-r29" >> $GITHUB_ENV

      - name: Build Windows
        run: geode build --platform windows

      - name: Build Android
        run: geode build --platform android

      - name: Extract Windows build
        run: |
          mkdir -p package/platform/win
          unzip -o build/*.geode -d package/platform/win/
          mv package/platform/win/sync.object_render_export.dll package/platform/win/

      - name: Extract Android build
        run: |
          mkdir -p package/platform/android
          unzip -o build-android64/*.geode -d package/platform/android/
          mv package/platform/android/libsync.object_render_export.so package/platform/android/

      - name: Copy shared files
        run: |
          cp mod.json package/
          cp -r resources package/
          cp logo.png package/

      - name: Create combined .geode
        run: |
          cd package
          zip -r ../sync.object_render_export.geode *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: object-render-export
          path: sync.object_render_export.geode

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: sync.object_render_export.geode
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
